          $ref: "#/components/schemas/IntegerDec"
        invalidNetworks:
          title: "invalidNetworks"
          $ref: "#/components/schemas/IntegerDec"
        invalidMessages:
          title: "invalidMessages"
          $ref: "#/components/schemas/IntegerDec"
        repeatedMessages:
          title: "repeatedMessages"
          $ref: "#/components/schemas/IntegerDec"
        timeoutMessages:
          title: "timeoutMessages"
          $ref: "#/components/schemas/IntegerDec"
        unexpectedMessages:
          title: "unexpectedMessages"
          $ref: "#/components/schemas/IntegerDec"
        peersTotalScore:
          title: "peersTotalScore"
          $ref: "#/components/schemas/IntegerDec"
        punishments:
