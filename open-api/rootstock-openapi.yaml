              -d '{"jsonrpc": "2.0", "method": "web3_sha3", "params": ["0x68656c6c6f20776f726c64"], "id": 1}'
        - lang: "JavaScript"
          label: "JavaScript (fetch)"
          source: |
            const response = await fetch('https://rpc.testnet.rootstock.io/YOUR_API_KEY', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({"jsonrpc": "2.0", "method": "web3_sha3", "params": ["0x68656c6c6f20776f726c64"], "id": 1})
            });
            const data = await response.json();
            console.log(data);
        - lang: "Python"
          label: "Python (requests)"
          source: |
            import requests
            
            payload = {"jsonrpc": "2.0", "method": "web3_sha3", "params": ["0x68656c6c6f20776f726c64"], "id": 1}
            response = requests.post('https://rpc.testnet.rootstock.io/YOUR_API_KEY', json=payload, timeout=30)
            print(response.json())
      x-jsonrpc-params:
        - name: "data"
          description: "Data to hash using the Keccak-256 algorithm"
          required: false
          schema:
            title: "data"
            type: "string"
            pattern: "^0x[a-fA-F\\d]+$"
components:
  schemas:
