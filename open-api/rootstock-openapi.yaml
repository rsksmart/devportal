        invalidBlocks:
          title: "invalidBlocks"
          $ref: "#/components/schemas/IntegerDec"
        invalidTransactions:
          title: "invalidTransactions"
          $ref: "#/components/schemas/IntegerDec"
        invalidMessages:
          title: "invalidMessages"
          $ref: "#/components/schemas/IntegerDec"
        timeoutMessages:
          title: "timeoutMessages"
          $ref: "#/components/schemas/IntegerDec"
        unexpectedMessages:
          title: "unexpectedMessages"
          $ref: "#/components/schemas/IntegerDec"
        invalidHeader:
          title: "invalidHeader"
          $ref: "#/components/schemas/IntegerDec"
        score:
          title: "score"
          $ref: "#/components/schemas/IntegerDec"
        punishments:
          title: "punishments"
          $ref: "#/components/schemas/IntegerDec"
        goodReputation:
          title: "goodReputation"
          type: "boolean"
        punishedUntil:
          title: "punishedUntil"
          $ref: "#/components/schemas/IntegerDec"
        id:
          title: "peer identifier"
          $ref: "#/components/schemas/NodeId"
        type:
          title: "type"
          type: "string"
          description: "Either 'node' or 'address' depending on what the system is using to score the peer"
    Position:
      title: "position"
      type: "string"
      description: "Hex representation of the storage slot where the variable exists"
      pattern: "^0x([a-fA-F0-9]?)+$"
    PowHash:
      title: "powHash"
      description: "Current block header PoW hash."
      $ref: "#/components/schemas/DataWord"
    ProofNode:
      title: "proofNode"
      description: "An individual node used to prove a path down a merkle-patricia-tree"
      $ref: "#/components/schemas/Bytes"
    Receipt:
      title: "receipt"
      type: "object"
      description: "The receipt of a transaction"
      required:
        - "blockHash"
        - "blockNumber"
        - "contractAddress"
        - "cumulativeGasUsed"
        - "from"
        - "gasUsed"
        - "logs"
        - "logsBloom"
        - "to"
        - "transactionHash"
        - "transactionIndex"
        - "type"
        - "effectiveGasPrice"
      properties:
        blockHash:
          $ref: "#/components/schemas/BlockHash"
        blockNumber:
          $ref: "#/components/schemas/BlockNumberHex"
        contractAddress:
